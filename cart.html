<!DOCTYPE html>
<html>

<head>
<title>Cart | AI Powered Smart Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#9333ea);
min-height:100vh;
color:white;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

.logo{
font-size:24px;
font-weight:600;
color:#facc15;
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:16px;
}

.nav-links a:hover{
color:#facc15;
}

/* MAIN */
.container{
display:flex;
padding:40px;
gap:40px;
}

/* BAG LIST */
.cart-list{
width:260px;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:12px;
}

.cart-item{
padding:10px;
margin-bottom:10px;
border-radius:8px;
background:rgba(255,255,255,0.15);
cursor:pointer;
display:flex;
justify-content:space-between;
}

.cart-item:hover{
background:rgba(255,255,255,0.25);
}

.add-cart{
margin-top:15px;
}

input{
width:100%;
padding:10px;
border:none;
border-radius:6px;
margin-top:5px;
color:#333;
}

/* CART CONTENT */
.cart-content{
flex:1;
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:12px;
}

.product{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:rgba(255,255,255,0.15);
border-radius:8px;
margin-bottom:10px;
}

.remove-btn{
background:#ef4444;
border:none;
padding:6px 15px;
border-radius:6px;
color:white;
cursor:pointer;
/* FIX: Override global button styles so it stays compact */
width: auto;
margin-top: 0;
}

button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:20px;
background:linear-gradient(45deg,#38bdf8,#9333ea);
color:white;
cursor:pointer;
}

/* ADD ITEM UI */
.add-item{
display:flex;
gap:10px;
margin-bottom:20px;
/* FIX: Vertically center the input and button */
align-items: center; 
}

.add-item input{
margin-top:0;
}

.add-item button{
margin-top:0;
width:150px;
}

/* CHECKOUT */
.checkout{
margin-top:20px;
text-align:right;
}

.checkout button{
width:200px;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">AI Powered Smart Shop</div>
<div class="nav-links">
<a href="index.html">Home</a>
<a href="cart.html" style="color:#facc15;">Cart</a>
<a href="login.html">Login</a>
</div>
</div>

<div class="container">

<div class="cart-list">
<h3>Your Bags</h3>
<div id="cartNames"></div>

<div class="add-cart">
<input type="text" id="cartName" placeholder="New bag name">
<button onclick="createCart()">Create Bag</button>
</div>
</div>

<div class="cart-content">
<h2 id="currentCart">Select a Bag</h2>

<div class="add-item" id="addItemUI" style="display:none">
<input type="text" id="productInput" placeholder="Enter product name">
<button onclick="handleAddItem()">Add Item</button>
</div>

<div id="products"></div>

<div class="checkout" id="checkoutUI" style="display:none">
<button onclick="checkout()">Checkout</button>
</div>
</div>

</div>

<script>
/* LOAD CARTS FROM STORAGE */
let carts = JSON.parse(localStorage.getItem("carts")) || {};
let currentCart = null;

/* SAVE CARTS */
function saveCarts(){
localStorage.setItem("carts", JSON.stringify(carts));
}

/* CREATE BAG */
function createCart(){
let name=document.getElementById("cartName").value.trim();
if(name==="") return;

if(carts[name]){
alert("Bag already exists");
return;
}

carts[name]=[];
currentCart=name;
document.getElementById("cartName").value="";

saveCarts();
renderCarts();
renderProducts();
}

/* DISPLAY BAGS */
function renderCarts(){
let container=document.getElementById("cartNames");
container.innerHTML="";

for(let cart in carts){
let div=document.createElement("div");
div.className="cart-item";
div.innerHTML=`${cart} <span>${carts[cart].length}</span>`;
div.onclick=function(){
currentCart=cart;
renderProducts();
}
container.appendChild(div);
}
}

/* DISPLAY PRODUCTS */
function renderProducts(){
let container=document.getElementById("products");
let addUI=document.getElementById("addItemUI");
let checkoutUI=document.getElementById("checkoutUI");

container.innerHTML="";

if(!currentCart){
document.getElementById("currentCart").innerText="Select a Bag";
addUI.style.display="none";
checkoutUI.style.display="none";
return;
}

document.getElementById("currentCart").innerText="Bag: "+currentCart;
addUI.style.display="flex";
checkoutUI.style.display="block";

let items=carts[currentCart];

if(items.length===0){
container.innerHTML="<p style='opacity:0.7'>This bag is empty</p>";
}

items.forEach((p,index)=>{
let div=document.createElement("div");
div.className="product";
div.innerHTML=`${p} <button class="remove-btn" onclick="removeItem(${index})">Remove</button>`;
container.appendChild(div);
});
}

/* ADD ITEM */
function handleAddItem(){
let product=document.getElementById("productInput").value.trim();
if(product==="") return;

carts[currentCart].push(product);
document.getElementById("productInput").value="";

saveCarts();
renderProducts();
renderCarts();
}

/* REMOVE ITEM */
function removeItem(index){
carts[currentCart].splice(index,1);
saveCarts();
renderProducts();
renderCarts();
}

/* CHECKOUT */
function checkout(){
if(carts[currentCart].length===0){
alert("Cart is empty");
return;
}
alert("Order placed from "+currentCart);
carts[currentCart]=[];

saveCarts();
renderProducts();
renderCarts();
}

/* LOAD EXISTING BAGS */
renderCarts();
</script>

</body>
</html>
